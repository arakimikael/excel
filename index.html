<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Quiz - Edu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* Desabilita botões clicados */
        .word-bank button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Animação de tremor (Erro) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        /* Animação de piscar vermelho suave (Erro) */
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(254, 226, 226, 1); border-color: rgba(248, 113, 113, 1); }
            50% { background-color: rgba(254, 202, 202, 1); border-color: rgba(239, 68, 68, 1); }
        }
        .animate-pulse-red {
            animation: pulse-red 0.8s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between">

    <header class="w-full max-w-md mx-auto bg-white p-4 shadow-sm sticky top-0 z-10 flex items-center gap-4">
        <span id="progress-text" class="text-sm font-bold text-gray-500">1/3</span>
        <div class="w-full bg-gray-200 rounded-full h-2.5">
            <div id="progress-bar" class="bg-green-500 h-2.5 rounded-full transition-all duration-300" style="width: 33%"></div>
        </div>
    </header>

    <main id="quiz-container" class="w-full max-w-md mx-auto p-4 flex-1 flex flex-col justify-between gap-6">
        
        <section class="flex flex-col gap-4">
            <h2 class="text-xl font-bold text-gray-900" id="question-title">Carregando pergunta...</h2>
            <div id="question-image-container" class="hidden w-full bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm p-2">
                <img id="question-image" src="" alt="Cenário do Excel" class="w-full h-auto object-contain max-h-48 rounded-lg mx-auto">
            </div>
        </section>

        <section class="flex flex-col gap-2">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Sua Resposta:</p>
            <div id="answer-zone" class="w-full min-h-[60px] bg-white border-2 border-dashed border-gray-300 rounded-xl p-3 flex flex-wrap gap-2 items-center transition-all duration-200">
                </div>
        </section>

        <section class="flex flex-col gap-2">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Toque nas palavras:</p>
            <div id="word-bank" class="word-bank w-full flex flex-wrap gap-2 p-1 justify-center">
                </div>
        </section>

        <footer class="w-full pt-4">
            <button id="action-btn" onclick="checkAnswer()" class="w-full py-4 bg-green-600 text-white font-bold rounded-xl shadow-md hover:bg-green-700 transition active:scale-[0.98] cursor-pointer">
                VERIFICAR
            </button>
        </footer>
    </main>

    <main id="result-container" class="hidden w-full max-w-md mx-auto p-6 flex-1 flex flex-col items-center justify-center text-center gap-6">
        <div class="text-6xl">🏆</div>
        <h2 class="text-3xl font-extrabold text-gray-900">Parabéns!</h2>
        <p class="text-gray-600 text-lg">Você concluiu a atividade de fixação de Excel.</p>
        <div class="bg-white border border-gray-200 rounded-2xl p-6 w-full shadow-sm">
            <span class="text-sm text-gray-500 font-medium block mb-1">Pontuação Final</span>
            <span id="score-text" class="text-4xl font-black text-green-600">0 / 0</span>
        </div>
        <button onclick="restartQuiz()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition cursor-pointer">
            TENTAR NOVAMENTE
        </button>
    </main>

    <script>
        let originalQuestions = []; 
        let questions = []; 
        let currentQuestionIndex = 0;
        let selectedWords = [];
        let score = 0;
        let isChecked = false;

        // Função para carregar as questões do arquivo externo JSON
        async function loadQuestionsFromJSON() {
            try {
                const response = await fetch('questoes.json');
                if (!response.ok) {
                    throw new Error('Não foi possível carregar o arquivo de questões.');
                }
                originalQuestions = await response.json();
                initQuiz();
            } catch (error) {
                console.error('Erro ao inicializar o quiz:', error);
                document.getElementById('question-title').innerText = "Erro ao carregar as perguntas. Verifique o arquivo JSON.";
            }
        }

        // Função para embaralhar arrays (Algoritmo Fisher-Yates)
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Inicializa o Quiz
        function initQuiz() {
            if (originalQuestions.length === 0) return;
            questions = shuffleArray(originalQuestions); 
            currentQuestionIndex = 0;
            score = 0;
            loadQuestion();
        }

        // Carrega a questão na tela
        function loadQuestion() {
            isChecked = false;
            selectedWords = [];
            
            const q = questions[currentQuestionIndex];
            
            const answerZone = document.getElementById('answer-zone');
            answerZone.className = "w-full min-h-[60px] bg-white border-2 border-dashed border-gray-300 rounded-xl p-3 flex flex-wrap gap-2 items-center transition-all duration-200";
            answerZone.innerHTML = '';

            // Atualiza Progresso
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
            
            // Atualiza Enunciado
            document.getElementById('question-title').innerText = q.title;
            
            // Trata Imagem
            const imgContainer = document.getElementById('question-image-container');
            const imgEl = document.getElementById('question-image');
            if(q.image) {
                imgEl.src = q.image;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            // Renderiza Banco de Palavras
            const wordBank = document.getElementById('word-bank');
            wordBank.innerHTML = '';
            q.options.forEach((word, index) => {
                const btn = document.createElement('button');
                btn.innerText = word;
                btn.id = `word-${index}`;
                btn.className = "px-4 py-2.5 bg-white border-2 border-gray-200 active:border-gray-400 rounded-xl font-medium shadow-sm cursor-pointer text-gray-700 transition active:scale-95";
                btn.onclick = () => selectWord(word, `word-${index}`);
                wordBank.appendChild(btn);
            });

            // Reseta botão de ação
            const actionBtn = document.getElementById('action-btn');
            actionBtn.innerText = "VERIFICAR";
            actionBtn.className = "w-full py-4 bg-green-600 text-white font-bold rounded-xl shadow-md hover:bg-green-700 transition cursor-pointer text-center";
        }

        function selectWord(word, btnId) {
            if(isChecked) return;
            const btn = document.getElementById(btnId);
            btn.disabled = true;
            selectedWords.push({ word, btnId });
            renderAnswerZone();
        }

        function deselectWord(index) {
            if(isChecked) return;
            const removed = selectedWords.splice(index, 1)[0];
            document.getElementById(removed.btnId).disabled = false;
            renderAnswerZone();
        }

        function renderAnswerZone() {
            const zone = document.getElementById('answer-zone');
            zone.innerHTML = '';
            selectedWords.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.innerText = item.word;
                btn.className = "px-3 py-1.5 bg-blue-50 border border-blue-200 text-blue-700 rounded-lg font-semibold cursor-pointer";
                btn.onclick = () => deselectWord(index);
                zone.appendChild(btn);
            });
        }

        // Validação com efeitos de animação e confetes
        function checkAnswer() {
            const actionBtn = document.getElementById('action-btn');
            const answerZone = document.getElementById('answer-zone');
            
            if (isChecked) {
                currentQuestionIndex++;
                if(currentQuestionIndex < questions.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
                return;
            }

            const q = questions[currentQuestionIndex];
            const userAnswers = selectedWords.map(item => item.word);
            
            const isCorrect = userAnswers.length === q.correctOrder.length && 
                              userAnswers.every((val, i) => val === q.correctOrder[i]);

            isChecked = true;

            if(isCorrect) {
                score++;
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });

                actionBtn.innerText = "CONTINUAR";
                actionBtn.className = "w-full py-4 bg-green-500 text-white font-bold rounded-xl shadow-md hover:bg-green-600 transition cursor-pointer";
                answerZone.className = "w-full min-h-[60px] bg-green-50 border-2 border-green-400 rounded-xl p-3 flex flex-wrap gap-2 items-center";
            } else {
                actionBtn.innerText = "CONTINUAR";
                actionBtn.className = "w-full py-4 bg-red-500 text-white font-bold rounded-xl shadow-md hover:bg-red-600 transition cursor-pointer";
                answerZone.className = "w-full min-h-[60px] rounded-xl p-3 flex flex-wrap gap-2 items-center border-2 animate-shake animate-pulse-red";
            }
        }

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('progress-bar').parentElement.parentElement.classList.add('hidden');
            
            const resultContainer = document.getElementById('result-container');
            resultContainer.classList.remove('hidden');
            
            document.getElementById('score-text').innerText = `${score} / ${questions.length}`;
            
            if(score === questions.length) {
                setTimeout(() => { confetti({ particleCount: 150, spread: 80 }); }, 300);
            }
        }

        function restartQuiz() {
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('progress-bar').parentElement.parentElement.classList.remove('hidden');
            initQuiz();
        }

        window.onload = loadQuestionsFromJSON;
    </script>
</body>
</html>
